<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Overlay Media</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: transparent;
  overflow: hidden;
  font-family: 'Poppins', sans-serif;
}

#box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.6);

  width: 650px;
  padding: 20px 30px;

  border-radius: 18px;
  overflow: hidden;

  color: white;

  opacity: 0;

  transition: 
    transform 0.5s cubic-bezier(.2,1.2,.3,1),
    opacity 0.4s ease;

  box-shadow: 0 10px 40px rgba(0,0,0,0.8);
}

#box.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
  animation: glowPulse 1.2s ease;
}

#box::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to right,
    rgba(0,0,0,0.75),
    rgba(0,0,0,0.55)
  );
  z-index: 1;
  border-radius: 18px;
}

.bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.7) blur(1px);
  z-index: 0;
}

.content {
  position: relative;
  z-index: 2;
  text-align: center;
}

.top {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 6px;
}

.amount { color: #ff7aa5; }
.name { color: #ff7aa5; }

.message {
  font-size: 16px;
  margin-top: 5px;
  opacity: 0.95;
}

.video-wrapper {
  width: 100%;
  max-height: 60vh;
  display: flex;
  justify-content: center;
  align-items: center;
  margin-top: 12px;
}

.video-wrapper iframe {
  width: 100%;
  height: 100%;
  border-radius: 12px;
  border: none;
  aspect-ratio: 16/9;
}

.mascot {
  position: absolute;
  right: -30px;
  bottom: -20px;
  z-index: 2;
}

.mascot img {
  width: 120px;
  opacity: 0.9;
}

@keyframes glowPulse {
  0% {
    box-shadow:
      0 0 0 rgba(255, 122, 165, 0),
      0 10px 40px rgba(0,0,0,0.8);
  }

  50% {
    box-shadow:
      0 0 25px rgba(255, 122, 165, 0.6),
      0 10px 40px rgba(0,0,0,0.8);
  }

  100% {
    box-shadow:
      0 0 0 rgba(255, 122, 165, 0),
      0 10px 40px rgba(0,0,0,0.8);
  }
}
</style>
</head>

<body>

<div id="box">

  <img src="https://ik.imagekit.io/avux/SaweriaOverlay/bg_sakura.jpg" class="bg">

  <div class="content">
    <div class="top">
      <span class="amount" id="amount"></span>
      Dari
      <span class="name" id="name"></span>
    </div>

    <div class="message" id="message"></div>

    <div id="media"></div>
  </div>

  <div class="mascot">
    <img src="https://ik.imagekit.io/avux/SaweriaOverlay/sakura.png">
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
window.onload = () => {

  const socket = io();
  const box = document.getElementById("box");

  let queue = [];
  let isPlaying = false;
  let currentAudio = null;
  let player = null;

  function format(num){
    return Number(num || 0).toLocaleString("id-ID");
  }

  function sleep(ms){
    return new Promise(r=>setTimeout(r,ms));
  }

  function speakNahida(text) {
    return new Promise(async (resolve) => {
      try {
        const url = "https://elianacharoline-api.vercel.app/tools/text-to-speech?apikey=ugaliuwt87t8wq98ysg98ay&model=nahida&text=" + encodeURIComponent(text);

        const res = await fetch(url);
        const data = await res.json();

        if (!data.result?.length) return resolve();

        if (currentAudio) currentAudio.pause();

        const audio = new Audio(data.result[0].url);
        currentAudio = audio;

        audio.onended = resolve;
        await audio.play();

      } catch {
        resolve();
      }
    });
  }

  socket.on("donation_media", (d)=>{
    queue.push(d);
    processQueue();
  });

  async function processQueue(){
    if(isPlaying) return;
    if(!queue.length) return;

    isPlaying = true;

    const data = queue.shift();
    const mediaDiv = document.getElementById("media");

    document.getElementById("name").innerText = data.name;
    document.getElementById("message").innerText = data.message;
    document.getElementById("amount").innerText =
      "Rp " + format(data.amount_original);

    mediaDiv.innerHTML = "";
    box.classList.add("show");

    // 🔥 TTS dulu
    await speakNahida(`${data.name} donasi ${format(data.amount_original)} rupiah. Pesan. ${data.message}`);

    await sleep(800);

   let videoId = "";

try {
  const url = data.media_url;

  if (url.includes("youtu.be")) {
    videoId = url.split("/").pop().split("?")[0];
  }
  else if (url.includes("/shorts/")) {
    videoId = url.split("/shorts/")[1].split("?")[0];
  }
  else if (url.includes("watch?v=")) {
    videoId = new URL(url).searchParams.get("v");
  }
  else if (url.includes("/embed/")) {
    videoId = url.split("/embed/")[1].split("?")[0];
  }

} catch (err) {
  console.log("❌ ERROR PARSE VIDEO:", err);
}

    let ended = false;

    mediaDiv.innerHTML = `
      <div class="video-wrapper">
        <div id="ytplayer"></div>
      </div>
    `;

    // 🔥 INIT YT PLAYER (INI KUNCI)
    player = new YT.Player("ytplayer", {
      videoId: videoId,
      playerVars: {
        autoplay: 1,
        mute: 1,
        playsinline: 1
      },
      events: {
        onReady: (e) => {
          e.target.unMute();
          e.target.setVolume(100);
        },
        onStateChange: (e) => {
          if (e.data === 0) { // ended
            ended = true;
          }
        }
      }
    });

    // 🔥 fallback max duration
  const donationDuration = Math.max(5, data.video_duration || 10);

let elapsed = 0;

while (true) {
  if (ended) break; // video selesai duluan
  if (elapsed >= donationDuration) break; // durasi donasi habis

  await sleep(1000);
  elapsed++;
}
    // 🔥 STOP PLAYER
    try {
      player.stopVideo();
      player.destroy();
    } catch {}

    // 🔥 END OVERLAY
    box.classList.remove("show");
    mediaDiv.innerHTML = "";

    isPlaying = false;
    processQueue();
  }

};
</script>

</body>
</html>
