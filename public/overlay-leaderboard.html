<!DOCTYPE html>
<html>
<head>
  <title>Leaderboard Overlay</title>

  <script src="/socket.io/socket.io.js"></script>

  <style>
    body {
      margin: 0;
      background: transparent;
      font-family: 'Poppins', sans-serif;
      color: white;
    }

    .box {
      width: 320px;
      padding: 15px;
      border-radius: 12px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
    }

    .title {
      text-align: center;
      font-weight: bold;
      margin-bottom: 10px;
      color: #ff7aa5;
    }

    .item {
      display: flex;
      justify-content: space-between;
      padding: 8px 10px;
      border-radius: 8px;
      margin-bottom: 6px;
      background: rgba(255,255,255,0.05);
      transition: transform 0.4s ease, background 0.4s;
    }

    .top1 {
      background: linear-gradient(90deg,#facc15,#f59e0b);
      color: black;
      font-weight: bold;
    }

    .updated {
      box-shadow: 0 0 12px rgba(34,197,94,0.7);
      transform: scale(1.05);
    }

    .amount {
      color: #22c55e;
      font-weight: bold;
    }

  </style>
</head>

<body>

<div class="box">
  <div class="title">🏆 Top Donasi</div>
  <div id="list"></div>
</div>

<script>
const socket = io();

let currentMap = {}; // simpan element lama

function format(num) {
  return Number(num).toLocaleString("id-ID");
}

async function load() {
  const res = await fetch("/leaderboard");
  const data = await res.json();

  const container = document.getElementById("list");

  // 🔥 STEP 1: simpan posisi lama
  const firstPos = {};
  Object.values(currentMap).forEach(el => {
    firstPos[el.dataset.name] = el.getBoundingClientRect();
  });

  // 🔥 STEP 2: render ulang tapi reuse element
  const newMap = {};

  data.forEach((d, i) => {
    let el = currentMap[d.name];

    if (!el) {
      el = document.createElement("div");
      el.className = "item";
      el.dataset.name = d.name;
    }

    el.innerHTML = `
      <div>#${i+1} ${d.name}</div>
      <div class="amount">Rp ${format(d.total)}</div>
    `;

    el.classList.remove("top1","updated");

    if (i === 0) el.classList.add("top1");

    container.appendChild(el);
    newMap[d.name] = el;
  });

  // 🔥 STEP 3: animasi FLIP
  data.forEach(d => {
    const el = newMap[d.name];

    const first = firstPos[d.name];
    const last = el.getBoundingClientRect();

    if (first) {
      const deltaY = first.top - last.top;

      if (deltaY !== 0) {
        el.style.transform = `translateY(${deltaY}px)`;

        requestAnimationFrame(() => {
          el.style.transform = "";
          el.classList.add("updated");

          setTimeout(() => el.classList.remove("updated"), 600);
        });
      }
    }
  });

  currentMap = newMap;
}

// 🔥 realtime
socket.on("dashboard_update", load);

load();
</script>

</body>
</html>
