<!DOCTYPE html>
<html>
<head>
  <title>Leaderboard Overlay</title>

  <script src="/socket.io/socket.io.js"></script>

  <style>
    body {
      margin: 0;
      background: transparent;
      font-family: 'Poppins', sans-serif;
      color: white;
    }

    .box {
      width: 300px;
      padding: 15px;
      border-radius: 12px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
    }

    .title {
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 10px;
      text-align: center;
      color: #ff7aa5;
    }

    .item {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .rank {
      color: #facc15;
      margin-right: 5px;
    }

    .name {
      flex: 1;
    }

    .amount {
      color: #22c55e;
      font-weight: bold;
    }

  </style>
</head>

<body>

<div class="box">
  <div class="title">🏆 Top Donasi</div>
  <div id="list"></div>
</div>

<script>
const socket = io();

function format(num) {
  return Number(num).toLocaleString("id-ID");
}

async function load() {
  const res = await fetch("/leaderboard");
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach((d, i) => {
    const el = document.createElement("div");
    el.className = "item";

    el.innerHTML = `
      <div class="name">
        <span class="rank">#${i+1}</span> ${d.name}
      </div>
      <div class="amount">Rp ${format(d.total)}</div>
    `;

    list.appendChild(el);
  });
}

// realtime update
socket.on("dashboard_update", load);

load();
</script>

</body>
</html>
