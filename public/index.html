<!DOCTYPE html>
<html>
<head>
  <title>Donate</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #1e293b, #0f172a);
    color: white;

    display: flex;
    justify-content: center;
    align-items: center;

    min-height: 100vh;
    padding: 20px;
  }

  .card {
    width: 100%;
    max-width: 380px;

    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(14px);

    padding: 28px;
    border-radius: 18px;

    box-shadow: 
      0 10px 40px rgba(0,0,0,0.4),
      inset 0 0 0 1px rgba(255,255,255,0.05);

    text-align: center;
  }

  h2 {
    margin: 0 0 20px;
    font-size: 22px;
  }

  form {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  input, textarea {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;

    background: rgba(255,255,255,0.08);
    color: white;

    font-size: 14px;
  }

  textarea {
    resize: none;
    height: 80px;
  }

  input::placeholder,
  textarea::placeholder {
    color: #aaa;
  }

  button {
    margin-top: 8px;
    padding: 13px;

    border: none;
    border-radius: 12px;

    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;

    font-weight: bold;
    font-size: 15px;

    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    transform: translateY(-2px);
    opacity: 0.95;
  }

  .note {
    margin-top: 14px;
    font-size: 12px;
    opacity: 0.7;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="card">
  <h2>💚 Eliana Charoline Donation</h2>

  <form id="form">
    <input name="name" placeholder="Nama kamu" required>
    <input name="amount" type="number" placeholder="Nominal (min 1000)" required>
    <input name="media_url" placeholder="Link YouTube / TikTok (opsional)">
    <textarea name="message" placeholder="Tulis pesan untuk streamer"></textarea>

    <button>Donate 🚀</button>
  </form>

  <div class="note">
    🎬 Media share min Rp 10.000<br>
    ⏱ Rp 200 = 1 detik video
  </div>
</div>

<script>
const form = document.getElementById("form");

form.onsubmit = async (e) => {
  e.preventDefault();

  const btn = form.querySelector("button");
  btn.innerText = "Loading...";
  btn.disabled = true;

  const data = Object.fromEntries(new FormData(form));

  try {
    const res = await fetch("/donate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    const json = await res.json();

    if (!json.id || !json.qr) {
      alert("QRIS gagal dibuat ❌");
      btn.innerText = "Donate 🚀";
      btn.disabled = false;
      return;
    }

    location.href = "/pay.html?id=" + json.id;

  } catch (err) {
    alert("Server error ❌");
    btn.innerText = "Donate 🚀";
    btn.disabled = false;
  }
};
</script>

</body>
</html>
