<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
  <title>History Donasi</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background: #111;
      color: white;
    }

    .item {
      background: #222;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    button {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      background: #00ff88;
      cursor: pointer;
    }

    input {
      padding: 6px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: none;
    }
  </style>
</head>
<body>

<h2>History Donasi</h2>

<label>Filter tanggal:</label><br>
<input type="date" id="filterDate" onchange="load()">

<div id="list"></div>

<script>
async function load() {
  const res = await fetch("/donations");
  const data = await res.json();

  const selectedDate = document.getElementById("filterDate").value;

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(d => {

    // 🔥 FILTER TANGGAL
    if (selectedDate) {
      const dDate = new Date(d.created_at).toISOString().split("T")[0];
      if (dDate !== selectedDate) return;
    }

    const el = document.createElement("div");
    el.className = "item";

    el.innerHTML = `
      <div class="top">
        <div>
          <b>${d.name}</b> - Rp ${Number(d.amount_original).toLocaleString("id-ID")}<br> kode unik - Rp ${Number(d.amount_unique).toLocaleString("id-ID")}<br>
          <small>${d.tanggal || "-"} • ${d.jam || "-"} WIB</small>
        </div>
        <button onclick="replay(${d.id})">▶ Replay</button>
      </div>

      <div style="margin-top:8px;">
        ${d.message || "-"}
      </div>
    `;

    list.appendChild(el);
  });
}

async function replay(id) {
  await fetch("/replay/" + id, { method: "POST" });
}

load();
</script>

</body>
</html>
