<!DOCTYPE html>
<html>
<head>
  <title>Pembayaran</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #1e293b, #0f172a);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 380px;
      text-align: center;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(14px);
      padding: 28px;
      border-radius: 18px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    h2 { margin: 0 0 15px; }

    .qr-box {
      background: white;
      padding: 15px;
      border-radius: 12px;
      display: inline-block;
      margin: 15px 0;
    }

    img { width: 250px; }

    .amount {
      font-size: 20px;
      font-weight: bold;
      margin-top: 10px;
    }

    .timer {
      margin-top: 10px;
      font-size: 18px;
      font-weight: bold;
      color: #facc15;
    }

    .danger { color: #ef4444; }

    .btn {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .btn:disabled {
      background: #555;
      cursor: not-allowed;
    }

    .success {
      color: #22c55e;
      font-size: 18px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="card" id="card">
  <h2>📱 Scan QRIS</h2>

  <div class="qr-box">
    <img id="qr">
  </div>

  <div class="amount" id="amount"></div>
 <h2>QRIS Expired dalam ⬇️ </h2>
  <div class="timer" id="timer">02:00</div>

  <!-- 🔥 BUTTON -->
  <button class="btn" id="checkBtn" onclick="checkPayment()">
    🔍 Cek Pembayaran
  </button>
</div>

<script>
const id = new URLSearchParams(location.search).get("id");
const card = document.getElementById("card");

let createdAt = null;
let countdownInterval = null;

function formatTime(sec) {
  const m = String(Math.floor(sec / 60)).padStart(2, "0");
  const s = String(sec % 60).padStart(2, "0");
  return `${m}:${s}`;
}

function startTimer() {
  countdownInterval = setInterval(() => {
    const now = Date.now();
    const diff = Math.floor((createdAt + 2*60*1000 - now) / 1000);

    const el = document.getElementById("timer");

    if (!el) return;

    if (diff <= 0) {
      clearInterval(countdownInterval);
      el.innerText = "00:00";
      el.classList.add("danger");

      document.getElementById("checkBtn").disabled = true;

      card.innerHTML = `
        <h2>⏰ Pembayaran Expired</h2>
        <button class="btn" onclick="location.href='/'">💚 Donasi Baru</button>
      `;
      return;
    }

    el.innerText = formatTime(diff);

    if (diff <= 20) {
      el.classList.add("danger");
    }

  }, 1000);
}

async function loadData() {
  const res = await fetch("/donation/" + id);
  const d = await res.json();

  if (!d || !d.qr) {
    card.innerHTML = "<h2>❌ QRIS tidak ditemukan</h2>";
    return;
  }

  createdAt = d.created_at;

  document.getElementById("qr").src = d.qr;
  document.getElementById("amount").innerText =
    "Rp " + Number(d.amount_unique).toLocaleString("id-ID");

  startTimer();
}

loadData();

/* ========================= */
/* 🔥 CHECK BUTTON */
async function checkPayment() {

  const btn = document.getElementById("checkBtn");
  btn.innerText = "⏳ Mengecek...";
  btn.disabled = true;

  try {
    const res = await fetch("/check/" + id);
    const d = await res.json();

    if (d.status === "paid") {

      clearInterval(countdownInterval);

      card.innerHTML = `
        <h2 class="success">✅ Pembayaran Berhasil</h2>
        <p>Terima kasih sudah donasi 💚</p>
        <p>Kembali dalam <b id="count">3</b> detik...</p>
      `;

      let count = 3;
      const el = document.getElementById("count");

      const timer = setInterval(() => {
        count--;
        if (el) el.innerText = count;

        if (count <= 0) {
          clearInterval(timer);
          location.href = "/";
        }
      }, 1000);

    } else if (d.status === "pending") {

      alert("❌ Pembayaran belum diterima!");

      btn.innerText = "🔍 Cek Pembayaran";
      btn.disabled = false;

    } else {

      alert("⏰ QRIS sudah expired!");

      location.reload();
    }

  } catch (e) {
    console.error(e);
    alert("❌ Gagal cek pembayaran");
    btn.innerText = "🔍 Cek Pembayaran";
    btn.disabled = false;
  }
}
</script>

</body>
</html>
