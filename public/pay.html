<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pembayaran</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #1e293b, #0f172a);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.card {
  width: 100%;
  max-width: 380px;
  text-align: center;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(14px);
  padding: 28px;
  border-radius: 18px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

h2 { margin: 0 0 15px; }

.qr-box {
  background: white;
  padding: 15px;
  border-radius: 12px;
  display: inline-block;
  margin: 15px 0;
}

img { width: 250px; }

.amount {
  font-size: 20px;
  font-weight: bold;
  margin-top: 10px;
}

.timer {
  margin-top: 10px;
  font-size: 18px;
  font-weight: bold;
  color: #facc15;
}

.danger { color: #ef4444; }

.btn {
  margin-top: 15px;
  padding: 10px;
  width: 100%;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.btn:disabled {
  background: #555;
  cursor: not-allowed;
}

.success {
  color: #22c55e;
  font-size: 18px;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="card" id="card">
  <h2>📱 Scan QRIS</h2>

  <div class="qr-box">
    <img id="qr">
  </div>

  <div class="amount" id="amount"></div>
  <div class="note">
    Qris Expired dalam ⏰
  </div>
  <div class="timer" id="timer">03:00</div>

  <button class="btn" id="checkBtn" onclick="checkPayment()">
    🔍 Cek Pembayaran
  </button>
</div>

<script>
const id = new URLSearchParams(location.search).get("id");
const card = document.getElementById("card");

let createdAt = null;
let countdownInterval = null;
let autoCheckInterval = null;

const EXPIRE_TIME = 3 * 60 * 1000; // 🔥 3 MENIT
const AUTO_CHECK_INTERVAL = 15000; // 🔥 15 DETIK

function formatTime(sec) {
  const m = String(Math.floor(sec / 60)).padStart(2, "0");
  const s = String(sec % 60).padStart(2, "0");
  return `${m}:${s}`;
}

function stopAll() {
  clearInterval(countdownInterval);
  clearInterval(autoCheckInterval);
}

function startTimer() {
  countdownInterval = setInterval(() => {
    const now = Date.now();
    const diff = Math.floor((createdAt + EXPIRE_TIME - now) / 1000);

    const el = document.getElementById("timer");

    if (!el) return;

    if (diff <= 0) {
      stopAll();

      el.innerText = "00:00";
      el.classList.add("danger");

      document.getElementById("checkBtn").disabled = true;

      card.innerHTML = `
        <h2>⏰ Pembayaran Expired</h2>
        <button class="btn" onclick="location.href='/'">💚 Donasi Baru</button>
      `;
      return;
    }

    el.innerText = formatTime(diff);

    if (diff <= 20) {
      el.classList.add("danger");
    }

  }, 1000);
}

// 🔥 AUTO CHECK
function startAutoCheck() {
  autoCheckInterval = setInterval(() => {
    checkPayment(true); // silent mode
  }, AUTO_CHECK_INTERVAL);
}

async function loadData() {
  const res = await fetch("/donation/" + id);
  const d = await res.json();

  if (!d || !d.qr) {
    card.innerHTML = "<h2>❌ QRIS tidak ditemukan</h2>";
    return;
  }

  createdAt = d.created_at;

  document.getElementById("qr").src = d.qr;
  document.getElementById("amount").innerText =
    "Rp " + Number(d.amount_unique).toLocaleString("id-ID");

  startTimer();
  startAutoCheck(); // 🔥 AUTO START
}

loadData();

/* ========================= */
/* 🔥 CHECK PAYMENT */
async function checkPayment(silent = false) {

  const btn = document.getElementById("checkBtn");

  if (!silent) {
    btn.innerText = "⏳ Mengecek...";
    btn.disabled = true;
  }

  try {
    const res = await fetch("/check/" + id);
    const d = await res.json();

    if (d.status === "paid") {

      stopAll();

      card.innerHTML = `
        <h2 class="success">✅ Pembayaran Berhasil</h2>
        <p>Terima kasih sudah donasi 💚</p>
        <p>Kembali dalam <b id="count">3</b> detik...</p>
      `;

      let count = 3;
      const el = document.getElementById("count");

      const timer = setInterval(() => {
        count--;
        if (el) el.innerText = count;

        if (count <= 0) {
          clearInterval(timer);
          location.href = "/";
        }
      }, 1000);

    } else if (d.status === "pending") {

      if (!silent) {
        alert("❌ Pembayaran belum diterima!");
        btn.innerText = "🔍 Cek Pembayaran";
        btn.disabled = false;
      }

    } else {

      stopAll();

      if (!silent) {
        alert("⏰ QRIS sudah expired!");
        location.reload();
      }
    }

  } catch (e) {
    console.error(e);

    if (!silent) {
      alert("❌ Gagal cek pembayaran");
      btn.innerText = "🔍 Cek Pembayaran";
      btn.disabled = false;
    }
  }
}
</script>

</body>
</html>
