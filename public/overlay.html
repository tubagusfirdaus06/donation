<!DOCTYPE html>
<html>
<head>
  <title>Overlay</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: transparent;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
    }

    #box {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%) scale(0.9);

      width: 650px;
      padding: 20px 30px;

      border-radius: 18px;
      overflow: hidden;

      color: white;

      opacity: 0;
      transition: 0.4s ease;

      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    }

    #box.show {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    /* 🌸 BACKGROUND */
    #box::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        rgba(0,0,0,0.75),
        rgba(0,0,0,0.55)
      );
      z-index: 1;
      border-radius: 18px;
    }

    .bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.7) blur(1px);
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .top {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .amount {
      color: #ff7aa5;
    }

    .name {
      color: #ff7aa5;
    }

    .message {
      font-size: 16px;
      margin-top: 5px;
      opacity: 0.95;
    }

    iframe {
      width: 100%;
      height: 220px;
      border-radius: 12px;
      border: none;
      margin-top: 12px;
    }

    .mascot {
      position: absolute;
      right: -30px;
      bottom: -20px;
      z-index: 2;
    }

    .mascot img {
      width: 120px;
      opacity: 0.9;
    }

  </style>
</head>

<body>

<div id="box">

  <img src="https://ik.imagekit.io/avux/SaweriaOverlay/bg_sakura.jpg" class="bg">

  <div class="content">
    <div class="top">
      <span class="amount" id="amount"></span>
      Dari
      <span class="name" id="name"></span>
    </div>

    <div class="message" id="message"></div>

    <div id="media"></div>
  </div>

  <div class="mascot">
    <img src="https://ik.imagekit.io/avux/SaweriaOverlay/sakura.png">
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
window.onload = () => {

  if (typeof io === "undefined") {
    console.error("❌ socket.io gagal load!");
    return;
  }

  window.socket = io();
  const box = document.getElementById("box");

  let queue = [];
  let isPlaying = false;
  let currentAudio = null;

  function speakNahida(text) {
    return new Promise(async (resolve) => {
      try {
        const url = "https://elianacharoline-api.vercel.app/tools/text-to-speech?apikey=ugaliuwt87t8wq98ysg98ay&model=nahida&text=" + encodeURIComponent(text);

        const res = await fetch(url);
        const data = await res.json();

        if (!data.result?.length) return resolve();

        if (currentAudio) currentAudio.pause();

        const audio = new Audio(data.result[0].url);
        currentAudio = audio;

        audio.onended = resolve;
        await audio.play();

      } catch {
        resolve();
      }
    });
  }

  function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
  }

  socket.on("donation", (data) => {
    queue.push(data);
    processQueue();
  });

  async function processQueue() {
    if (isPlaying) return;
    if (queue.length === 0) return;

    isPlaying = true;

    const data = queue.shift();
    const mediaDiv = document.getElementById("media");

    document.getElementById("name").innerText = data.name;
    document.getElementById("message").innerText = data.message;
    document.getElementById("amount").innerText = "Rp " + data.amount_original;

    mediaDiv.innerHTML = "";
    box.classList.add("show");

    // 🔊 TTS
    await speakNahida(`${data.name} donasi ${data.amount_original} rupiah. Pesan ${data.message}`);

    await sleep(500);

    // ❌ RULE
    if (!data.media_url || data.amount_original < 10000) {
      await sleep(3000);
      box.classList.remove("show");
      isPlaying = false;
      processQueue();
      return;
    }

    // 🎬 VIDEO (INI TIDAK DIUBAH)
    let videoId = "";
    if (data.media_url.includes("youtu.be")) {
      videoId = data.media_url.split("/").pop();
    } else {
      videoId = new URL(data.media_url).searchParams.get("v");
    }

    mediaDiv.innerHTML = `
      <iframe 
        id="ytplayer"
        src="https://www.youtube.com/embed/${videoId}?enablejsapi=1&autoplay=1&mute=1&playsinline=1"
        allow="autoplay; encrypted-media"
        allowfullscreen>
      </iframe>
    `;

    // ▶️ PLAY
    setTimeout(() => {
      const iframe = document.getElementById("ytplayer");

      iframe?.contentWindow?.postMessage(JSON.stringify({
        event: "command",
        func: "playVideo"
      }), "*");

      setTimeout(() => {
        iframe?.contentWindow?.postMessage(JSON.stringify({
          event: "command",
          func: "unMute"
        }), "*");

        iframe?.contentWindow?.postMessage(JSON.stringify({
          event: "command",
          func: "setVolume",
          args: [100]
        }), "*");
      }, 1500);

    }, 500);

    const duration = data.video_duration || Math.floor(data.amount_original / 200);

console.log("⏱ Durasi video:", duration);

// ⏳ tunggu sesuai durasi
await sleep(duration * 1000);

// 🔥 STOP VIDEO PAKSA
const iframe = document.getElementById("ytplayer");

iframe?.contentWindow?.postMessage(JSON.stringify({
  event: "command",
  func: "stopVideo"
}), "*");

// delay sedikit biar stop kebaca
await sleep(300);

// 🧹 clean UI
box.classList.remove("show");
mediaDiv.innerHTML = "";

isPlaying = false;
processQueue();
  }

};
</script>

</body>
</html>
