<!DOCTYPE html>
<html>
<head>
  <title>Overlay</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: transparent;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
    }

    #box {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%) scale(0.9);

      width: 650px;
      padding: 20px 30px;

      border-radius: 18px;
      overflow: hidden;

      color: white;

      opacity: 0;
      transition: 0.4s ease;

      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    }

    #box.show {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    #box::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        rgba(0,0,0,0.75),
        rgba(0,0,0,0.55)
      );
      z-index: 1;
      border-radius: 18px;
    }

    .bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.7) blur(1px);
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .top {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .amount {
      color: #ff7aa5;
    }

    .name {
      color: #ff7aa5;
    }

    .message {
      font-size: 16px;
      margin-top: 5px;
      opacity: 0.95;
    }

    /* 🔥 VIDEO RESPONSIVE */
    .video-wrapper {
      width: 100%;
      max-height: 60vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 12px;
    }

    .video-wrapper iframe {
      width: 100%;
      height: 100%;
      border-radius: 12px;
      border: none;
      aspect-ratio: 16/9;
    }

    .mascot {
      position: absolute;
      right: -30px;
      bottom: -20px;
      z-index: 2;
    }

    .mascot img {
      width: 120px;
      opacity: 0.9;
    }

  </style>
</head>

<body>

<div id="box">

  <img src="https://ik.imagekit.io/avux/SaweriaOverlay/bg_sakura.jpg" class="bg">

  <div class="content">
    <div class="top">
      <span class="amount" id="amount"></span>
      Dari
      <span class="name" id="name"></span>
    </div>

    <div class="message" id="message"></div>

    <div id="media"></div>
  </div>

  <div class="mascot">
    <img src="https://ik.imagekit.io/avux/SaweriaOverlay/sakura.png">
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
window.onload = () => {

  if (typeof io === "undefined") {
    console.error("❌ socket.io gagal load!");
    return;
  }

  function formatRupiah(num) {
    if (!num) return "0";
    return Number(num).toLocaleString("id-ID");
  }

  window.socket = io();
  const box = document.getElementById("box");

  let queue = [];
  let isPlaying = false;
  let currentAudio = null;

  function speakNahida(text) {
    return new Promise(async (resolve) => {
      try {
        const url = "https://elianacharoline-api.vercel.app/tools/text-to-speech?apikey=ugaliuwt87t8wq98ysg98ay&model=nahida&text=" + encodeURIComponent(text);

        const res = await fetch(url);
        const data = await res.json();

        if (!data.result?.length) return resolve();

        if (currentAudio) currentAudio.pause();

        const audio = new Audio(data.result[0].url);
        currentAudio = audio;

        audio.onended = resolve;
        await audio.play();

      } catch {
        resolve();
      }
    });
  }

  function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
  }

  socket.on("donation", (data) => {
    queue.push(data);
    processQueue();
  });

  async function processQueue() {
    if (isPlaying) return;
    if (queue.length === 0) return;

    isPlaying = true;

    const data = queue.shift();
    const mediaDiv = document.getElementById("media");

    document.getElementById("name").innerText = data.name;
    document.getElementById("message").innerText = data.message;
    document.getElementById("amount").innerText =
      "Rp " + formatRupiah(data.amount_original);

    mediaDiv.innerHTML = "";
    box.classList.add("show");

    await speakNahida(`${data.name} donasi ${formatRupiah(data.amount_original)} rupiah. Pesan ${data.message}`);

    await sleep(500);

    if (!data.media_url || data.amount_original < 10000) {
      await sleep(3000);
      box.classList.remove("show");
      isPlaying = false;
      processQueue();
      return;
    }
let videoId = "";

try {
  const url = data.media_url;

  if (url.includes("youtu.be")) {
    videoId = url.split("/").pop();
  }

  else if (url.includes("/shorts/")) {
    videoId = url.split("/shorts/")[1].split("?")[0];
  }

  else if (url.includes("watch?v=")) {
    videoId = new URL(url).searchParams.get("v");
  }

  else if (url.includes("/embed/")) {
    videoId = url.split("/embed/")[1].split("?")[0];
  }

} catch (e) {
  console.log("❌ gagal parse video id");
}

    mediaDiv.innerHTML = `
      <div class="video-wrapper">
        <iframe 
          id="ytplayer"
          src="https://www.youtube.com/embed/${videoId}?enablejsapi=1&autoplay=1&mute=1&playsinline=1"
          allow="autoplay; encrypted-media"
          allowfullscreen>
        </iframe>
      </div>
    `;

    // 🔥 AUTO DETECT ORIENTATION
    setTimeout(() => {
      const iframe = document.getElementById("ytplayer");

      const isPortrait = window.innerHeight > window.innerWidth;

      iframe.style.aspectRatio = isPortrait ? "9/16" : "16/9";

    }, 500);

    setTimeout(() => {
      const iframe = document.getElementById("ytplayer");

      iframe?.contentWindow?.postMessage(JSON.stringify({
        event: "command",
        func: "playVideo"
      }), "*");

      setTimeout(() => {
        iframe?.contentWindow?.postMessage(JSON.stringify({
          event: "command",
          func: "unMute"
        }), "*");

        iframe?.contentWindow?.postMessage(JSON.stringify({
          event: "command",
          func: "setVolume",
          args: [100]
        }), "*");
      }, 1500);

    }, 500);

    const duration = data.video_duration || Math.floor(data.amount_original / 200);

    console.log("⏱ Durasi video:", duration);

    await sleep(duration * 1000);

    const iframe = document.getElementById("ytplayer");

    iframe?.contentWindow?.postMessage(JSON.stringify({
      event: "command",
      func: "stopVideo"
    }), "*");

    await sleep(300);

    box.classList.remove("show");
    mediaDiv.innerHTML = "";

    isPlaying = false;
    processQueue();
  }

};
</script>

</body>
</html>
